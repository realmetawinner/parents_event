<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2단계 - 패턴 인식</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      user-select: none;
    }

    /* 헤더 */
    .atm-header {
      width: 100%;
      background: linear-gradient(90deg, #003580, #0057c8);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00aaff44;
      flex-shrink: 0;
    }
    .atm-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .atm-logo span { color: #00d4ff; }
    .step-indicator { display: flex; gap: 6px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a5a; }
    .step-dot.active { background: #00aaff; box-shadow: 0 0 6px #00aaff; }
    .step-dot.done { background: #00ff88; }

    /* 메인 바디 */
    .atm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 10px 20px;
      width: 100%;
      min-height: 0;
    }

    .info-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-align: center;
    }

    .step-label { font-size: 0.7rem; color: #4a8aaa; letter-spacing: 3px; }
    .step-title { font-size: 1.2rem; font-weight: 700; }
    .step-desc { font-size: 0.8rem; color: #6a9aaa; line-height: 1.4; }

    /* 패턴 영역 */
    .pattern-area {
      position: relative;
      width: 250px; /* 기본 크기 약간 축소 */
      height: 200px;
      touch-action: none;
      flex-shrink: 0;
    }

    #pattern-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
      width: 100%; height: 100%;
      position: relative;
      z-index: 1;
    }

    .pcell {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .pchar {
      position: absolute;
      font-size: 1.1rem;
      font-weight: 700;
      color: rgba(180, 220, 255, 0.25);
      pointer-events: none;
      z-index: 2;
    }

    .pdot {
      width: 12px; height: 12px;
      background: transparent;
      border-radius: 50%;
      z-index: 3;
      transition: all 0.1s;
    }

    .pdot.active { width: 18px; height: 18px; background: #ff6699; border: 2px solid #ffaacc; box-shadow: 0 0 10px #ff6699; }
    .pdot.success { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    .pdot.error { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

    .status-msg { font-size: 0.85rem; color: #00aaff; min-height: 1.2rem; }
    .status-msg.success { color: #00ff88; }
    .status-msg.error { color: #ff6666; }

    /* 푸터 */
    .atm-footer {
      width: 100%;
      padding: 10px 24px;
      background: #050a14;
      border-top: 1px solid #00aaff22;
      text-align: center;
      font-size: 0.7rem;
      color: #2a4a66;
      flex-shrink: 0;
    }

    /* 하트 파티클 */
    #heart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    .heart-particle { position: absolute; font-size: 1.5rem; opacity: 0; animation: heartBurst 1s linear forwards; }
    @keyframes heartBurst {
      0% { transform: translate(0, 0) scale(0.2); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
    }

    /* ======================================================
       가로 모드 (Landscape) 최적화
    ====================================================== */
    @media (orientation: landscape) and (max-height: 500px) {
      .atm-header { padding: 6px 24px; }
      .atm-footer { padding: 6px 24px; }
      
      .atm-body {
        flex-direction: row; /* 좌우 배치 */
        justify-content: space-evenly;
        gap: 30px;
        padding: 5px 30px;
      }

      .info-section {
        align-items: flex-start;
        text-align: left;
        max-width: 200px;
      }

      .step-label { display: none; }
      .step-title { font-size: 1.1rem; }
      .step-desc { font-size: 0.75rem; }

      .pattern-area {
        width: 280px; /* 가로 모드에선 그리드를 더 크게 */
        height: 180px;
      }
      
      .pchar { font-size: 1rem; }
    }
  </style>
</head>

<body>

  <header class="atm-header">
    <div class="atm-logo" onclick="window.location.href='index.html'">FAMILY <span>ATM</span></div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </header>

  <main class="atm-body">
    <section class="info-section">
      <div class="step-label">STEP 2 / 5</div>
      <div class="step-title">보안 패턴 인식</div>
      <div class="step-desc">'다함께 행복해집니다'를<br>따라 그려보세요</div>
      <div class="status-msg" id="status-msg">패턴을 그어주세요</div>
    </section>

    <div class="pattern-area" id="pattern-area">
      <canvas id="pattern-canvas"></canvas>
      <div class="pattern-grid" id="pattern-grid"></div>
    </div>
  </main>

  <div id="heart-overlay"></div>

  <footer class="atm-footer">화면에서 손가락을 떼지 말고 이어서 그려주세요</footer>

  <script>
    const COLS = 5, ROWS = 4;
    const CHARS = [
      ['룰', '함', '사', '니', '별'],
      ['께', '정', '다', '표', '집'],
      ['츄', '행', '꺽', '해', '퀵'],
      ['쑥', '택', '복', '퀭', '슭'],
    ];

    // 다(7) -> 함(1) -> 께(5) -> 행(11) -> 복(17) -> 해(13) -> 집(9) -> 니(3) -> 다(7)
    const CORRECT = [7, 1, 5, 11, 17, 13, 9, 3, 7];

    let sequence = [];
    let isDrawing = false;
    let cursorPos = null;
    const dotEls = [];
    const canvas = document.getElementById('pattern-canvas');
    const area = document.getElementById('pattern-area');

    // 캔버스 크기 초기화 및 리사이즈 대응
    function initCanvas() {
      canvas.width = area.clientWidth;
      canvas.height = area.clientHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    // 그리드 생성
    const grid = document.getElementById('pattern-grid');
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const idx = r * COLS + c;
        const cell = document.createElement('div');
        cell.className = 'pcell';
        cell.innerHTML = `
          <div class="pchar">${CHARS[r][c]}</div>
          <div class="pdot" id="dot-${idx}"></div>
        `;
        grid.appendChild(cell);
        dotEls.push(cell.querySelector('.pdot'));
      }
    }

    // 터치/마우스 이벤트
    area.addEventListener('mousedown', onStart);
    area.addEventListener('mousemove', onMove);
    area.addEventListener('mouseup', onEnd);
    area.addEventListener('touchstart', onStart, { passive: false });
    area.addEventListener('touchmove', onMove, { passive: false });
    area.addEventListener('touchend', onEnd, { passive: false });

    function getPos(e) {
      const rect = area.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function nodeAtPoint(pos) {
      const cellW = area.clientWidth / COLS;
      const cellH = area.clientHeight / ROWS;
      const col = Math.floor(pos.x / cellW);
      const row = Math.floor(pos.y / cellH);
      
      if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
        const idx = row * COLS + col;
        // 셀 중앙 근처에 왔을 때만 인식 (판정 범위 조절)
        const centerX = col * cellW + cellW / 2;
        const centerY = row * cellH + cellH / 2;
        const dist = Math.hypot(pos.x - centerX, pos.y - centerY);
        if (dist < cellW * 0.4) return idx;
      }
      return -1;
    }

    function onStart(e) {
      e.preventDefault();
      initCanvas(); // 시작 시 크기 재확인
      const pos = getPos(e);
      const idx = nodeAtPoint(pos);
      if (idx < 0) return;
      sequence = [idx];
      isDrawing = true;
      cursorPos = pos;
      updateDots('active');
      redraw();
    }

    function onMove(e) {
      e.preventDefault();
      if (!isDrawing) return;
      const pos = getPos(e);
      cursorPos = pos;
      const idx = nodeAtPoint(pos);

      if (idx >= 0 && idx !== sequence[sequence.length - 1]) {
        if (!sequence.includes(idx) || (idx === CORRECT[CORRECT.length-1] && sequence.length === CORRECT.length - 1)) {
          sequence.push(idx);
          updateDots('active');
        }
      }
      redraw();
    }

    function onEnd() {
      if (!isDrawing) return;
      isDrawing = false;
      cursorPos = null;
      checkPattern();
      redraw();
    }

    function getDotCenter(idx) {
      const cellW = area.clientWidth / COLS;
      const cellH = area.clientHeight / ROWS;
      return {
        x: (idx % COLS) * cellW + cellW / 2,
        y: Math.floor(idx / COLS) * cellH + cellH / 2
      };
    }

    function redraw() {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (sequence.length === 0) return;

      ctx.beginPath();
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(255, 100, 150, 0.8)';
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const first = getDotCenter(sequence[0]);
      ctx.moveTo(first.x, first.y);

      for (let i = 1; i < sequence.length; i++) {
        const next = getDotCenter(sequence[i]);
        ctx.lineTo(next.x, next.y);
      }

      if (isDrawing && cursorPos) {
        ctx.lineTo(cursorPos.x, cursorPos.y);
      }
      ctx.stroke();
    }

    function updateDots(state) {
      dotEls.forEach((dot, i) => {
        dot.className = 'pdot' + (sequence.includes(i) ? ' ' + state : '');
      });
    }

    function checkPattern() {
      const isMatch = sequence.length === CORRECT.length && sequence.every((v, i) => v === CORRECT[i]);
      const msg = document.getElementById('status-msg');

      if (isMatch) {
        updateDots('success');
        msg.className = 'status-msg success';
        msg.textContent = '💗 패턴 인증 완료!';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        launchHearts();
        setTimeout(() => window.location.href = 'step3.html', 1500);
      } else {
        updateDots('error');
        msg.className = 'status-msg error';
        msg.textContent = '❌ 패턴이 올바르지 않습니다';
        setTimeout(() => {
          sequence = [];
          updateDots('');
          msg.className = 'status-msg';
          msg.textContent = '패턴을 다시 그려주세요';
          redraw();
        }, 1000);
      }
    }

    function launchHearts() {
      const overlay = document.getElementById('heart-overlay');
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'heart-particle';
        el.textContent = ['❤️', '💗', '💖', '💝'][Math.floor(Math.random() * 4)];
        el.style.left = '50%';
        el.style.top = '50%';
        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 200;
        el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        el.style.setProperty('--rot', Math.random() * 360 + 'deg');
        overlay.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }
  </script>
</body>
</html>
