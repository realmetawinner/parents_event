<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>4단계 - 가족 퀴즈</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      user-select: none;
    }

    /* 헤더 */
    .atm-header {
      width: 100%;
      background: linear-gradient(90deg, #003580, #0057c8);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00aaff44;
      flex-shrink: 0;
    }
    .atm-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .atm-logo span { color: #00d4ff; }
    .step-indicator { display: flex; gap: 6px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a5a; }
    .step-dot.active { background: #00aaff; box-shadow: 0 0 6px #00aaff; }
    .step-dot.done { background: #00ff88; }

    /* 메인 바디 */
    .atm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      padding: 10px 20px;
      width: 100%;
      min-height: 0;
    }

    /* 왼쪽/위쪽 정보 섹션 */
    .quiz-info-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .step-label { font-size: 0.7rem; color: #4a8aaa; letter-spacing: 3px; }
    .step-title { font-size: 1.2rem; font-weight: 700; text-align: center; }

    .quiz-card {
      background: #0d1428;
      border: 1px solid #1a3a6a;
      border-radius: 12px;
      padding: 15px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-badge { font-size: 0.65rem; color: #4a8aaa; text-align: center; }
    .quiz-question { font-size: 0.95rem; color: #aaddff; text-align: center; line-height: 1.6; min-height: 2.5rem; }
    .quiz-divider { height: 1px; background: linear-gradient(90deg, transparent, #00aaff44, transparent); }

    .answer-display {
      background: #0a0f1e;
      border: 2px solid #1a3a6a;
      border-radius: 8px;
      padding: 8px;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: 4px;
    }
    .answer-display.success { border-color: #00ff88; color: #00ff88; }
    .answer-display.error { border-color: #ff4444; color: #ff6666; animation: shake 0.4s ease; }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    /* 숫자 키패드 */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 260px;
    }

    .key-btn {
      background: #0d1a2e;
      border: 1px solid #1a3a5a;
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .key-btn:active { background: #0057c8; transform: scale(0.95); }
    .key-btn.del-btn { font-size: 0.9rem; color: #6a9aaa; }
    .key-btn.confirm-btn { background: linear-gradient(135deg, #0057c8, #00aaff); font-size: 0.85rem; }

    .status-msg { font-size: 0.8rem; color: #00aaff; min-height: 1.2rem; }
    .status-msg.success { color: #00ff88; }
    .status-msg.error { color: #ff6666; }

    /* 푸터 */
    .atm-footer {
      width: 100%;
      padding: 10px 24px;
      background: #050a14;
      border-top: 1px solid #00aaff22;
      text-align: center;
      font-size: 0.7rem;
      color: #2a4a66;
      flex-shrink: 0;
    }

    /* ======================================================
       가로 모드 (Landscape) 최적화
    ====================================================== */
    @media (orientation: landscape) and (max-height: 500px) {
      .atm-header { padding: 6px 24px; }
      .atm-footer { padding: 6px 24px; }
      
      .atm-body {
        flex-direction: row; /* 좌우 배치 */
        justify-content: space-evenly;
        gap: 20px;
        padding: 5px 30px;
      }

      .quiz-info-section {
        max-width: 280px;
        gap: 5px;
      }

      .step-label { display: none; }
      .step-title { font-size: 1rem; }
      .quiz-card { padding: 10px; }
      .quiz-question { font-size: 0.85rem; min-height: auto; }
      .answer-display { font-size: 1.2rem; padding: 5px; }

      .keypad {
        max-width: 220px;
        gap: 6px;
      }
      .key-btn { padding: 8px; font-size: 1rem; }
      .key-btn.del-btn, .key-btn.confirm-btn { font-size: 0.75rem; }
      
      .status-msg { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <header class="atm-header">
    <div class="atm-logo" onclick="window.location.href='index.html'">FAMILY <span>ATM</span></div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
  </header>

  <main class="atm-body">
    <section class="quiz-info-section">
      <div class="step-label">STEP 4 / 5</div>
      <div class="step-title">인출 한도 확인</div>

      <div class="quiz-card">
        <div class="quiz-badge">⚠️ 보안 퀴즈 인증 필요</div>
        <div class="quiz-question" id="quiz-question">불러오는 중...</div>
        <div class="quiz-divider"></div>
        <div class="answer-display" id="answer-display">?</div>
      </div>
      <div class="status-msg" id="status-msg">정답을 입력하세요</div>
    </section>

    <section class="keypad">
      <button class="key-btn" onclick="pressKey('1')">1</button>
      <button class="key-btn" onclick="pressKey('2')">2</button>
      <button class="key-btn" onclick="pressKey('3')">3</button>
      <button class="key-btn" onclick="pressKey('4')">4</button>
      <button class="key-btn" onclick="pressKey('5')">5</button>
      <button class="key-btn" onclick="pressKey('6')">6</button>
      <button class="key-btn" onclick="pressKey('7')">7</button>
      <button class="key-btn" onclick="pressKey('8')">8</button>
      <button class="key-btn" onclick="pressKey('9')">9</button>
      <button class="key-btn del-btn" onclick="deleteLast()">⌫</button>
      <button class="key-btn" onclick="pressKey('0')">0</button>
      <button class="key-btn confirm-btn" onclick="checkAnswer()">확인</button>
    </section>
  </main>

  <footer class="atm-footer">가족의 소중한 날짜를 기억해 주세요 ❤️</footer>

  <script>
    const settings = JSON.parse(localStorage.getItem('atm_settings') || '{}');
    const question = settings.quizQuestion || '아빠 생신(05) + 엄마 생신(10) + 내 생일(08) = ?';
    const correctAnswer = settings.quizAnswer || '0525';

    document.getElementById('quiz-question').textContent = question;

    let input = '';

    function updateDisplay(state) {
      const el = document.getElementById('answer-display');
      el.textContent = input || '?';
      el.className = 'answer-display' + (state ? ' ' + state : '');
    }

    function pressKey(num) {
      if (input.length >= 6) return;
      input += num;
      updateDisplay('');
    }

    function deleteLast() {
      input = input.slice(0, -1);
      updateDisplay('');
    }

    function checkAnswer() {
      if (!input) return;
      if (input === correctAnswer) {
        updateDisplay('success');
        document.getElementById('status-msg').className = 'status-msg success';
        document.getElementById('status-msg').textContent = '✅ 정답입니다!';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        setTimeout(() => window.location.href = 'step5.html', 1200);
      } else {
        updateDisplay('error');
        document.getElementById('status-msg').className = 'status-msg error';
        document.getElementById('status-msg').textContent = '❌ 다시 시도해 주세요';
        if (navigator.vibrate) navigator.vibrate(400);
        setTimeout(() => {
          input = '';
          updateDisplay('');
          document.getElementById('status-msg').className = 'status-msg';
          document.getElementById('status-msg').textContent = '정답을 입력하세요';
        }, 1000);
      }
    }
  </script>
</body>
</html>
