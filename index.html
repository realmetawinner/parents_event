<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>부모님 용돈 ATM</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #ffffff;
      height: 100dvh; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      user-select: none;
    }

    #hidden-tap-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      z-index: 100;
    }

    /* 상단 헤더 */
    .atm-header {
      width: 100%;
      background: linear-gradient(90deg, #003580, #0057c8);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00aaff44;
      flex-shrink: 0;
    }

    .atm-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; }
    .atm-logo span { color: #00d4ff; }
    .atm-status { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: #a0c8ff; }
    .status-dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; animation: blink 1.5s infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 메인 콘텐츠 */
    .atm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      width: 100%;
      min-height: 0;
    }

    /* 카드 아이콘 (디자인 복구 완료) */
    .card-icon {
      position: relative;
      width: 80px;
      height: 55px;
      flex-shrink: 0;
    }

    .card-icon .card {
      width: 100%;
      height: 100%;
      border: 3px solid #00aaff;
      border-radius: 8px;
      background: linear-gradient(135deg, #0a1a3a, #0d2555);
      position: relative;
      animation: cardFloat 3s ease-in-out infinite;
      box-shadow: 0 0 15px #00aaff44;
    }

    /* 노란색 IC 칩 */
    .card-icon .card::before {
      content: '';
      position: absolute;
      top: 25%;
      left: 12%;
      width: 32%;
      height: 38%;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      border-radius: 3px;
    }

    /* 하단 장식 라인 */
    .card-icon .card::after {
      content: '';
      position: absolute;
      bottom: 20%;
      left: 12%;
      right: 12%;
      height: 3px;
      background: #00aaff55;
      border-radius: 2px;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    /* 환영 메시지 */
    .welcome-section { text-align: center; display: flex; flex-direction: column; gap: 8px; }
    .welcome-main { font-size: 1.5rem; font-weight: 700; }
    .welcome-main .highlight { color: #00d4ff; }
    .welcome-sub { font-size: 0.85rem; color: #8ab4d4; }

    .divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00aaff88, transparent);
    }

    .info-ticker {
      background: #00aaff11;
      border: 1px solid #00aaff33;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: #a0c8ff;
      width: 90%;
      max-width: 300px;
      text-align: center;
    }

    .start-btn {
      background: linear-gradient(135deg, #0057c8, #00aaff);
      color: #ffffff;
      border: none;
      border-radius: 50px;
      padding: 12px 40px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 4px 20px #00aaff55;
      transition: all 0.2s ease;
    }

    .atm-footer {
      width: 100%;
      padding: 10px 24px;
      background: #050a14;
      border-top: 1px solid #00aaff22;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-time { font-size: 0.75rem; color: #4a6a88; }
    .footer-notice { font-size: 0.7rem; color: #2a4a66; }

    /* 가로 모드 최적화 (칩 디자인 유지됨) */
    @media (orientation: landscape) and (max-height: 500px) {
      .atm-header { padding: 6px 20px; }
      .atm-footer { padding: 6px 20px; }
      .atm-body { flex-direction: row; gap: 30px; padding: 5px; }
      .card-icon { width: 60px; height: 42px; }
      .welcome-section { text-align: left; }
      .welcome-main { font-size: 1.2rem; }
      .welcome-sub { font-size: 0.75rem; }
      .divider, .info-ticker { display: none; }
      .start-btn { padding: 10px 30px; font-size: 0.9rem; }
    }

    /* 파티클 효과 */
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; background: #00aaff; border-radius: 50%; opacity: 0; animation: particleRise linear infinite; }
    @keyframes particleRise {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-10px); opacity: 0; }
    }

    #tap-toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff6600cc;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
    }
  </style>
</head>
<body>

  <div id="hidden-tap-zone"></div>
  <div class="bg-particles" id="particles"></div>

  <header class="atm-header">
    <div class="atm-logo">FAMILY <span>ATM</span></div>
    <div class="atm-status">
      <div class="status-dot"></div>
      <span>정상 운영 중</span>
    </div>
  </header>

  <main class="atm-body">
    <div class="card-icon">
      <div class="card"></div>
    </div>

    <div class="welcome-section">
      <div class="welcome-main" id="welcome-msg">
        반갑습니다, <span class="highlight">고객님</span>
      </div>
      <div class="welcome-sub">안전하고 따뜻한 Family ATM입니다</div>
    </div>

    <div class="divider"></div>

    <div class="info-ticker">
      <span class="ticker-text" id="ticker">
        고객님의 소중한 거래를 도와드립니다
      </span>
    </div>

    <button class="start-btn" onclick="goToStep1()">거래 시작</button>
  </main>

  <footer class="atm-footer">
    <div class="footer-time" id="clock">00:00:00</div>
    <div class="footer-notice">24시간 가족 전용 서비스</div>
  </footer>

  <div id="tap-toast"></div>

  <script>
    // 이름 로드
    (function () {
      const s = JSON.parse(localStorage.getItem('atm_settings') || '{}');
      const names = [s.dadName, s.momName].filter(Boolean).join(', ');
      if (names) {
        document.getElementById('welcome-msg').innerHTML =
          `반갑습니다, <span class="highlight">${names}</span> 고객님`;
      }
    })();

    // 시계
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 롤링 메시지
    const tickerMessages = [
      '고객님의 소중한 거래를 도와드립니다',
      '보안 인증 절차를 통해 안전하게 거래하세요',
      '따뜻한 마음을 전달해 드립니다 ❤️',
    ];
    let tickerIdx = 0;
    setInterval(() => {
      tickerIdx = (tickerIdx + 1) % tickerMessages.length;
      document.getElementById('ticker').textContent = tickerMessages[tickerIdx];
    }, 4000);

    // 파티클 생성
    const container = document.getElementById('particles');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }

    // 관리자 진입
    let tapCount = 0;
    let tapTimer = null;
    document.getElementById('hidden-tap-zone').addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapTimer);
      if (tapCount >= 5) {
        window.location.href = 'admin.html';
        return;
      }
      showToast(`관리자 진입: ${tapCount}/5`);
      tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
    });

    function showToast(msg) {
      const toast = document.getElementById('tap-toast');
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 1000);
    }

    function goToStep1() {
      window.location.href = 'step1.html';
    }
  </script>
</body>
</html>
