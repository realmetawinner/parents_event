<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3단계 - 음성 인증</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      user-select: none;
    }

    .atm-header {
      width: 100%;
      background: linear-gradient(90deg, #003580, #0057c8);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00aaff44;
    }
    .atm-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .atm-logo span { color: #00d4ff; }
    .step-indicator { display: flex; gap: 6px; align-items: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a5a; }
    .step-dot.active { background: #00aaff; box-shadow: 0 0 6px #00aaff; }
    .step-dot.done { background: #00ff88; }

    .atm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
      width: 100%;
    }

    .step-label { font-size: 0.75rem; color: #4a8aaa; letter-spacing: 3px; text-transform: uppercase; }
    .step-title { font-size: 1.4rem; font-weight: 700; text-align: center; }
    .step-desc { font-size: 0.9rem; color: #6a9aaa; text-align: center; line-height: 1.8; }

    /* 마이크 아이콘 */
    .mic-wrap {
      position: relative;
      width: 130px; height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mic-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid #00aaff00;
      width: 130px; height: 130px;
    }
    .mic-ring.listening {
      border-color: #00aaff44;
      animation: micRipple 1s ease-out infinite;
    }
    .mic-ring:nth-child(2) { animation-delay: 0.3s !important; }
    .mic-ring:nth-child(3) { animation-delay: 0.6s !important; }

    @keyframes micRipple {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .mic-btn {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #0057c8, #0088ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 4px 20px #0057c855;
      transition: all 0.2s;
      z-index: 1;
      border: none;
      cursor: pointer;
    }
    .mic-btn.listening {
      background: linear-gradient(135deg, #cc0000, #ff4444);
      box-shadow: 0 4px 20px #ff444455;
      animation: micPulse 0.8s ease-in-out infinite;
    }
    .mic-btn.success {
      background: linear-gradient(135deg, #006600, #00cc44);
    }

    @keyframes micPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* 인식 텍스트 큰 표시창 */
    .voice-display {
      width: 100%;
      max-width: 300px;
      background: #0a1a2a;
      border: 2px solid #0a3a6a;
      border-radius: 16px;
      padding: 18px 20px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .voice-display.listening {
      border-color: #00aaff66;
      animation: boxGlow 1s ease-in-out infinite;
    }
    .voice-display.success {
      border-color: #00ff88;
      box-shadow: 0 0 24px #00ff8844;
    }
    .voice-display.fail {
      border-color: #ff4444;
      box-shadow: 0 0 20px #ff444433;
      animation: boxShake 0.4s ease;
    }

    @keyframes boxGlow {
      0%, 100% { box-shadow: 0 0 8px #00aaff22; }
      50%       { box-shadow: 0 0 20px #00aaff44; }
    }
    @keyframes boxShake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* 인식된 텍스트 — 크게 */
    .voice-text {
      font-size: 1.6rem;
      font-weight: 700;
      color: #aaddff;
      text-align: center;
      letter-spacing: 2px;
      word-break: break-all;
      line-height: 1.4;
      transition: color 0.3s;
    }
    .voice-display.listening .voice-text { color: #ffffff; }
    .voice-display.success   .voice-text { color: #00ff88; }
    .voice-display.fail      .voice-text { color: #ff6666; }

    /* 작은 상태 표시줄 */
    .status-line {
      font-size: 0.85rem;
      color: #4a7a9a;
      text-align: center;
      min-height: 1.2rem;
      letter-spacing: 1px;
    }
    .status-line.success { color: #00ff88; font-weight: 700; }
    .status-line.fail    { color: #ff6666; }

    /* 실패 토스트 알림 */
    .retry-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #3a0a0a;
      border: 1px solid #ff444466;
      color: #ffaaaa;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 0.88rem;
      text-align: center;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .retry-toast.show { opacity: 1; }

    .atm-footer {
      width: 100%;
      padding: 14px 24px;
      background: #050a14;
      border-top: 1px solid #00aaff22;
      text-align: center;
      font-size: 0.75rem;
      color: #2a4a66;
    }
  </style>
</head>
<body>

  <header class="atm-header">
    <div class="atm-logo" onclick="window.location.href='index.html'">FAMILY <span>ATM</span></div>
    <div class="step-indicator">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </header>

  <main class="atm-body">
    <div class="step-label">STEP 3 / 5</div>
    <div class="step-title">음성 보안 인증</div>
    <div class="step-desc">마이크 버튼을 누르고<br>지정된 암호를 말씀해 주세요</div>

    <div class="mic-wrap" onclick="toggleListen()">
      <div class="mic-ring" id="ring1"></div>
      <div class="mic-ring" id="ring2"></div>
      <div class="mic-ring" id="ring3"></div>
      <button class="mic-btn" id="mic-btn">🎙️</button>
    </div>

    <div class="voice-display" id="voice-display">
      <div class="voice-text" id="voice-text">—</div>
    </div>
    <div class="status-line" id="status-line">마이크 버튼을 눌러 시작하세요</div>
  </main>

  <div class="retry-toast" id="retry-toast">
    ⚠️ 인식된 내용이 다릅니다<br>다시 마이크를 눌러 말씀해 주세요
  </div>

  <footer class="atm-footer">음성은 기기 내에서만 처리되며 저장되지 않습니다</footer>

  <script>
    const settings = JSON.parse(localStorage.getItem('atm_settings') || '{}');
    const keyword = settings.voiceKeyword || '사랑해';

    let recognition = null;
    let isListening = false;

    function toggleListen() {
      if (isListening) stopListen();
      else startListen();
    }

    function startListen() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        document.getElementById('status-msg').textContent = '⚠️ 이 브라우저는 음성 인식을 지원하지 않습니다';
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = false;
      recognition.interimResults = true;

      recognition.onstart = () => {
        isListening = true;
        setVoiceState('listening', '듣고 있습니다...', '🎙️ 지금 말씀하세요');
        document.getElementById('mic-btn').className = 'mic-btn listening';
        ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).className = 'mic-ring listening');
      };

      recognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript;
          else interim += e.results[i][0].transcript;
        }
        const heard = final || interim || '';
        if (heard) document.getElementById('voice-text').textContent = heard;

        if (final) {
          if (final.includes(keyword)) onSuccess();
          else onFail(heard);
        }
      };

      recognition.onerror = () => {
        stopListen();
        setVoiceState('fail', '인식 오류', '다시 눌러 시도해 주세요');
        showRetryToast('마이크 오류가 발생했습니다\n다시 눌러 시도해 주세요');
      };

      recognition.onend = () => { if (isListening) stopListen(); };
      recognition.start();
    }

    function stopListen() {
      isListening = false;
      if (recognition) recognition.stop();
      document.getElementById('mic-btn').className = 'mic-btn';
      ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).className = 'mic-ring');
    }

    function setVoiceState(state, bigText, statusText) {
      const disp = document.getElementById('voice-display');
      disp.className = 'voice-display' + (state !== 'idle' ? ' ' + state : '');
      document.getElementById('voice-text').textContent = bigText;
      const sl = document.getElementById('status-line');
      sl.className = 'status-line' + (state === 'success' ? ' success' : state === 'fail' ? ' fail' : '');
      sl.textContent = statusText;
    }

    function showRetryToast(msg) {
      const toast = document.getElementById('retry-toast');
      toast.innerHTML = '⚠️ ' + msg.replace('\n', '<br>');
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    function onFail(heard) {
      stopListen();
      setVoiceState('fail', heard || '?', '인식된 내용이 다릅니다');
      showRetryToast('인식된 내용이 다릅니다\n다시 마이크를 눌러 말씀해 주세요');
      if (navigator.vibrate) navigator.vibrate(300);
      setTimeout(() => setVoiceState('idle', '—', '마이크 버튼을 눌러 시작하세요'), 2200);
    }

    function onSuccess() {
      isListening = false;
      if (recognition) recognition.stop();
      document.getElementById('mic-btn').className = 'mic-btn success';
      document.getElementById('mic-btn').textContent = '✅';
      ['ring1','ring2','ring3'].forEach(id => document.getElementById(id).className = 'mic-ring');
      setVoiceState('success', '✅ 인증 완료!', '음성 인증이 완료되었습니다');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      setTimeout(() => window.location.href = 'step4.html', 1400);
    }
  </script>

</body>
</html>
