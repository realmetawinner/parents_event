<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 설정</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #0a0f1e; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    .admin-header { background: linear-gradient(90deg, #1a0030, #3a0060); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #aa00ff44; }
    .admin-title { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 700; }
    .admin-badge { background: #aa00ff33; border: 1px solid #aa00ff88; color: #cc88ff; font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; }
    .admin-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; max-width: 480px; width: 100%; margin: 0 auto; }
    .setting-card { background: #0d1428; border: 1px solid #2a1a4a; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .setting-card h3 { font-size: 0.95rem; color: #cc88ff; display: flex; align-items: center; gap: 8px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.8rem; color: #8a7aaa; }
    input[type="text"], textarea { background: #0a0f1e; border: 1px solid #2a2a4a; border-radius: 8px; color: #ffffff; padding: 10px 14px; width: 100%; outline: none; }
    .pin-input-wrap { display: flex; gap: 10px; justify-content: center; }
    .pin-digit { width: 52px; height: 52px; background: #0a0f1e; border: 1px solid #2a2a4a; border-radius: 8px; color: #ffffff; font-size: 1.4rem; text-align: center; outline: none; }
    .keyword-hint { display: flex; gap: 8px; flex-wrap: wrap; }
    .keyword-tag { background: #1a0a2a; border: 1px solid #4a2a6a; color: #cc88ff; font-size: 0.78rem; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
    .save-btn { background: linear-gradient(135deg, #6600cc, #aa00ff); color: #ffffff; border: none; border-radius: 50px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 24px #aa00ff44; }
    .back-btn { background: transparent; color: #6a4a8a; border: 1px solid #2a1a4a; border-radius: 50px; padding: 12px; font-size: 0.85rem; cursor: pointer; }
    #save-toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #00cc66cc; color: white; padding: 12px 28px; border-radius: 30px; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; }
    .saved-preview { background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; color: #44aa66; display: none; line-height: 1.6; }
    .saved-preview.visible { display: block; }
  </style>
</head>
<body>

  <header class="admin-header">
    <div class="admin-title">🔒 관리자 설정</div>
    <div class="admin-badge">HIDDEN MODE</div>
  </header>

  <main class="admin-body">
    <div class="setting-card">
      <h3>👨‍👩‍👧 부모님 정보</h3>
      <div class="field-group">
        <label>아버지 성함</label>
        <input type="text" id="dad-name" placeholder="예) 홍길동" />
      </div>
      <div class="field-group">
        <label>어머니 성함</label>
        <input type="text" id="mom-name" placeholder="예) 김영희" />
      </div>
    </div>

    <!-- PIN 설정 카드 (누락되었던 부분 추가) -->
    <div class="setting-card">
      <h3>🔑 관리자 PIN 번호</h3>
      <div class="pin-input-wrap">
        <input type="password" class="pin-digit" id="pin1" maxlength="1" inputmode="numeric">
        <input type="password" class="pin-digit" id="pin2" maxlength="1" inputmode="numeric">
        <input type="password" class="pin-digit" id="pin3" maxlength="1" inputmode="numeric">
        <input type="password" class="pin-digit" id="pin4" maxlength="1" inputmode="numeric">
      </div>
    </div>

    <div class="setting-card">
      <h3>🎙️ 음성 인증 키워드</h3>
      <div class="field-group">
        <input type="text" id="voice-keyword" placeholder="예) 사랑해" />
      </div>
      <div class="keyword-hint">
        <span class="keyword-tag" onclick="setKeyword('사랑해')">사랑해</span>
        <span class="keyword-tag" onclick="setKeyword('고마워')">고마워</span>
        <span class="keyword-tag" onclick="setKeyword('감사합니다')">감사합니다</span>
      </div>
    </div>

    <div class="setting-card">
      <h3>🧮 인출 퀴즈 설정</h3>
      <div class="field-group">
        <label>퀴즈 문제</label>
        <textarea id="quiz-question" placeholder="예) 엄마생일+아빠생일=?"></textarea>
      </div>
      <div class="field-group">
        <label>정답 숫자</label>
        <input type="text" id="quiz-answer" inputmode="numeric" placeholder="예) 2198" />
      </div>
    </div>

    <div class="saved-preview" id="saved-preview"></div>

    <button class="save-btn" onclick="saveSettings()">✅ 설정 저장</button>
    <button class="back-btn" onclick="goBack()">← 메인으로 돌아가기</button>
  </main>

  <div id="save-toast">✅ 설정이 저장되었습니다!</div>

  <script>
    // PIN 자동 포커스
    document.querySelectorAll('.pin-digit').forEach((input, idx, arr) => {
      input.addEventListener('input', () => {
        if (input.value && idx < arr.length - 1) arr[idx + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) arr[idx - 1].focus();
      });
    });

    function setKeyword(word) {
      document.getElementById('voice-keyword').value = word;
    }

    function saveSettings() {
      // PIN 값 가져오기
      const pinValue = ['pin1', 'pin2', 'pin3', 'pin4']
        .map(id => document.getElementById(id).value)
        .join('');

      const settings = {
        dadName: document.getElementById('dad-name').value.trim(),
        momName: document.getElementById('mom-name').value.trim(),
        pin: pinValue, // PIN 저장 추가
        voiceKeyword: document.getElementById('voice-keyword').value.trim(),
        quizQuestion: document.getElementById('quiz-question').value.trim(),
        quizAnswer: document.getElementById('quiz-answer').value.trim(),
      };

      if (!settings.voiceKeyword || !settings.quizAnswer) {
        alert('필수 정보를 입력해주세요.');
        return;
      }

      localStorage.setItem('atm_settings', JSON.stringify(settings));
      showToast();
      showPreview(settings);
    }

    function showToast() {
      const toast = document.getElementById('save-toast');
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function showPreview(s) {
      const el = document.getElementById('saved-preview');
      el.className = 'saved-preview visible';
      el.innerHTML = `
        <b>현재 저장된 데이터:</b><br>
        부모님: ${s.dadName || '미입력'}/${s.momName || '미입력'}<br>
        키워드: ${s.voiceKeyword} | 퀴즈답: ${s.quizAnswer}
      `;
    }

    function loadSettings() {
      const raw = localStorage.getItem('atm_settings');
      if (!raw) return;
      const s = JSON.parse(raw);
      
      if (s.dadName) document.getElementById('dad-name').value = s.dadName;
      if (s.momName) document.getElementById('mom-name').value = s.momName;
      if (s.voiceKeyword) document.getElementById('voice-keyword').value = s.voiceKeyword;
      if (s.quizQuestion) document.getElementById('quiz-question').value = s.quizQuestion;
      if (s.quizAnswer) document.getElementById('quiz-answer').value = s.quizAnswer;
      
      if (s.pin && s.pin.length === 4) {
        s.pin.split('').forEach((d, i) => {
          const el = document.getElementById('pin' + (i + 1));
          if(el) el.value = d;
        });
      }
      showPreview(s);
    }

    function goBack() {
      location.href = 'index.html';
    }

    window.onload = loadSettings;
  </script>
</body>
</html>
