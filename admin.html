<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 설정</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    .admin-header {
      background: linear-gradient(90deg, #1a0030, #3a0060);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #aa00ff44;
    }

    .admin-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .lock-icon {
      font-size: 1.2rem;
    }

    .admin-badge {
      background: #aa00ff33;
      border: 1px solid #aa00ff88;
      color: #cc88ff;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* 메인 콘텐츠 */
    .admin-body {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .section-title {
      font-size: 0.75rem;
      color: #aa88cc;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* 카드 */
    .setting-card {
      background: #0d1428;
      border: 1px solid #2a1a4a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setting-card h3 {
      font-size: 0.95rem;
      color: #cc88ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-card h3 .emoji {
      font-size: 1.1rem;
    }

    /* 입력 필드 */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.8rem;
      color: #8a7aaa;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      background: #0a0f1e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      border-color: #aa00ff88;
      box-shadow: 0 0 0 2px #aa00ff22;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #3a3a5a;
    }

    textarea {
      resize: none;
      height: 60px;
      line-height: 1.5;
    }

    /* PIN 입력 */
    .pin-input-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .pin-digit {
      width: 52px;
      height: 52px;
      background: #0a0f1e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1.4rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .pin-digit:focus {
      border-color: #aa00ff88;
      box-shadow: 0 0 0 2px #aa00ff22;
    }

    /* 키워드 태그 */
    .keyword-hint {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .keyword-tag {
      background: #1a0a2a;
      border: 1px solid #4a2a6a;
      color: #cc88ff;
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .keyword-tag:hover {
      background: #aa00ff33;
      border-color: #aa00ffaa;
    }

    /* 저장 버튼 */
    .save-btn {
      background: linear-gradient(135deg, #6600cc, #aa00ff);
      color: #ffffff;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 24px #aa00ff44;
      transition: all 0.2s;
    }

    .save-btn:hover,
    .save-btn:active {
      transform: scale(1.02);
      box-shadow: 0 6px 32px #aa00ffaa;
    }

    /* 뒤로가기 */
    .back-btn {
      background: transparent;
      color: #6a4a8a;
      border: 1px solid #2a1a4a;
      border-radius: 50px;
      padding: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #cc88ff;
      border-color: #4a2a6a;
    }

    /* 저장 완료 토스트 */
    #save-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #00cc66cc;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }

    /* 현재 저장값 미리보기 */
    .saved-preview {
      background: #0a1a0a;
      border: 1px solid #1a3a1a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #44aa66;
      display: none;
    }

    .saved-preview.visible {
      display: block;
    }
  </style>
</head>

<body>

  <!-- 헤더 -->
  <header class="admin-header">
    <div class="admin-title">
      <span class="lock-icon">🔒</span>
      관리자 설정
    </div>
    <div class="admin-badge">HIDDEN MODE</div>
  </header>

  <!-- 메인 -->
  <main class="admin-body">

    <!-- 부모님 정보 -->
    <div class="setting-card">
      <h3><span class="emoji">👨‍👩‍👧</span> 부모님 정보</h3>
      <div class="field-group">
        <label>아버지 성함(할아버지 성함)
        </label>
        <input type="text" id="dad-name" placeholder="예) 홍길동" />
      </div>
      <div class="field-group">
        <label>어머니 성함(할머니 성함)</label>
        <input type="text" id="mom-name" placeholder="예) 김영희" />
      </div>
    </div>

    <!-- 음성 키워드 -->
    <div class="setting-card">
      <h3><span class="emoji">🎙️</span> 음성 인증 키워드</h3>
      <div class="field-group">
        <label>부모님이 말씀하셔야 하는 단어</label>
        <input type="text" id="voice-keyword" placeholder="예) 사랑해" />
      </div>
      <div class="keyword-hint">
        <span class="keyword-tag" onclick="setKeyword('사랑해')">사랑해</span>
        <span class="keyword-tag" onclick="setKeyword('고마워')">고마워</span>
        <span class="keyword-tag" onclick="setKeyword('감사합니다')">감사합니다</span>
        <span class="keyword-tag" onclick="setKeyword('사랑합니다')">사랑합니다</span>
      </div>
    </div>

    <!-- 인출 퀴즈 + PIN -->
    <div class="setting-card">
      <h3><span class="emoji">🧮</span> 인출 한도 퀴즈 설정</h3>
      <div class="field-group">
        <label>퀴즈 문제 (가족 날짜로 구성)</label>
        <textarea id="quiz-question" placeholder="예) 엄마생일+아빠생일+내생일=? (2198)"></textarea>
      </div>
      <div class="field-group">
        <label>정답 숫자</label>
        <input type="text" id="quiz-answer" inputmode="numeric" placeholder="예) 2198" />
      </div>
    </div>

    <!-- 현재 저장값 -->
    <div class="saved-preview" id="saved-preview"></div>

    <!-- 버튼 -->
    <button class="save-btn" onclick="saveSettings()">✅ 설정 저장</button>
    <button class="back-btn" onclick="goBack()">← 메인으로 돌아가기</button>

  </main>

  <div id="save-toast">✅ 설정이 저장되었습니다!</div>

  <script>
    // PIN 자동 포커스 이동
    document.querySelectorAll('.pin-digit').forEach((input, idx, arr) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value && idx < arr.length - 1) arr[idx + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) arr[idx - 1].focus();
      });
    });

    // 키워드 빠른 입력
    function setKeyword(word) {
      document.getElementById('voice-keyword').value = word;
    }

    // 저장
    function saveSettings() {
      const pin = ['pin1', 'pin2', 'pin3', 'pin4'].map(id => document.getElementById(id).value).join('');

      if (!document.getElementById('voice-keyword').value.trim()) {
        alert('음성 인증 키워드를 입력해주세요.');
        return;
      }
      if (!document.getElementById('quiz-answer').value.trim()) {
        alert('퀴즈 정답을 입력해주세요.');
        return;
      }

      const settings = {
        dadName: document.getElementById('dad-name').value.trim(),
        momName: document.getElementById('mom-name').value.trim(),
        voiceKeyword: document.getElementById('voice-keyword').value.trim(),
        quizQuestion: document.getElementById('quiz-question').value.trim(),
        quizAnswer: document.getElementById('quiz-answer').value.trim(),
      };

      localStorage.setItem('atm_settings', JSON.stringify(settings));
      showToast();
      showPreview(settings);
    }

    function showToast() {
      const toast = document.getElementById('save-toast');
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
    }

    function showPreview(s) {
      const el = document.getElementById('saved-preview');
      el.className = 'saved-preview visible';
      el.innerHTML = `
        저장됨 — 아버지: ${s.dadName || '미입력'} / 어머니: ${s.momName || '미입력'}<br>
        PIN: ${'●'.repeat(4)} / 키워드: ${s.voiceKeyword} / 퀴즈 정답: ${s.quizAnswer}
      `;
    }

    // 기존 저장값 불러오기
    function loadSettings() {
      const raw = localStorage.getItem('atm_settings');
      if (!raw) return;
      const s = JSON.parse(raw);
      if (s.dadName) document.getElementById('dad-name').value = s.dadName;
      if (s.momName) document.getElementById('mom-name').value = s.momName;
      if (s.pin) {
        s.pin.split('').forEach((d, i) => {
          document.getElementById('pin' + (i + 1)).value = d;
        });
      }
      if (s.voiceKeyword) document.getElementById('voice-keyword').value = s.voiceKeyword;
      if (s.quizQuestion) document.getElementById('quiz-question').value = s.quizQuestion;
      if (s.quizAnswer) document.getElementById('quiz-answer').value = s.quizAnswer;
      showPreview(s);
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    loadSettings();
  </script>

</body>

</html>
