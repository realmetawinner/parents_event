<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>1단계 - 지문 인식</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0f1e;
      color: #fff;
      height: 100dvh; /* 실제 가용 화면 높이 사용 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      user-select: none;
    }

    /* 헤더 */
    .atm-header {
      width: 100%;
      background: linear-gradient(90deg, #003580, #0057c8);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00aaff44;
      flex-shrink: 0;
    }
    .atm-logo { font-size: 1rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
    .atm-logo span { color: #00d4ff; }
    .step-indicator { display: flex; gap: 6px; align-items: center; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #1a3a5a; }
    .step-dot.active { background: #00aaff; box-shadow: 0 0 6px #00aaff; }
    .step-dot.done { background: #00ff88; }

    /* 메인 바디 */
    .atm-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px; /* 세로 간격 축소 */
      padding: 10px 24px;
      width: 100%;
      min-height: 0; /* flex 자식 잘림 방지 */
    }

    .step-label { font-size: 0.7rem; color: #4a8aaa; letter-spacing: 3px; text-transform: uppercase; }
    .step-title { font-size: 1.2rem; font-weight: 700; text-align: center; line-height: 1.3; }
    .step-desc { font-size: 0.85rem; color: #6a9aaa; text-align: center; line-height: 1.5; }

    /* 지문 컨테이너 */
    .fp-container {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .fp-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .fp-name { font-size: 0.8rem; color: #6a9aaa; }
    .fp-name.done { color: #00ff88; font-weight: 700; }

    .fingerprint-wrap {
      position: relative;
      width: 90px; /* 기본 크기 축소 */
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: none;
    }

    .fp-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid #00aaff22;
      animation: ringPulse 2s ease-out infinite;
    }
    .fp-ring:nth-child(1) { width: 90px; height: 90px; animation-delay: 0s; }
    .fp-ring:nth-child(2) { width: 70px; height: 70px; animation-delay: 0.4s; }
    .fp-ring:nth-child(3) { width: 50px; height: 50px; animation-delay: 0.8s; }

    @keyframes ringPulse {
      0% { opacity: 0.6; transform: scale(0.95); }
      100% { opacity: 0; transform: scale(1.15); }
    }

    .fp-icon {
      font-size: 2.5rem; /* 아이콘 크기 조절 */
      z-index: 1;
      filter: drop-shadow(0 0 8px #00aaff88);
    }

    .scan-overlay {
      position: absolute;
      width: 50px; height: 50px;
      border-radius: 50%;
      overflow: hidden;
      display: none;
      z-index: 2;
    }
    .scan-overlay.active { display: block; }
    .laser-beam {
      position: absolute;
      width: 100%; height: 3px;
      background: #00ff88;
      top: 0;
      animation: laserScan 0.4s linear infinite;
      box-shadow: 0 0 8px #00ff88;
    }
    @keyframes laserScan { 0% { top: 0; } 100% { top: 100%; } }

    /* 게이지 */
    .gauge-wrap {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gauge-wrap.visible { opacity: 1; }
    .gauge-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #4a8aaa; }
    .gauge-bar { width: 100%; height: 6px; background: #0a1a2a; border-radius: 4px; overflow: hidden; border: 1px solid #0a3a5a; }
    .gauge-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0057c8, #00ff88); transition: width 0.1s linear; }

    .status-msg { font-size: 0.85rem; color: #00aaff; min-height: 1.2rem; }
    .status-msg.success { color: #00ff88; }

    /* 푸터 */
    .atm-footer {
      width: 100%;
      padding: 10px 24px;
      background: #050a14;
      border-top: 1px solid #00aaff22;
      text-align: center;
      font-size: 0.7rem;
      color: #2a4a66;
      flex-shrink: 0;
    }

    /* ======================================================
       가로 모드 (Landscape) 최적화
    ====================================================== */
    @media (orientation: landscape) and (max-height: 500px) {
      .atm-header { padding: 6px 24px; }
      .atm-footer { padding: 6px 24px; }
      .atm-body { gap: 8px; padding: 5px 20px; }
      
      .step-label { display: none; } /* 공간 확보를 위해 라벨 숨김 */
      .step-title { font-size: 1.1rem; }
      .step-desc { font-size: 0.75rem; }

      .fp-container { gap: 40px; }
      .fingerprint-wrap { width: 70px; height: 70px; }
      .fp-ring:nth-child(1) { width: 70px; height: 70px; }
      .fp-ring:nth-child(2) { width: 55px; height: 55px; }
      .fp-ring:nth-child(3) { width: 40px; height: 40px; }
      .fp-icon { font-size: 2rem; }
      .scan-overlay { width: 40px; height: 40px; }

      .gauge-wrap { width: 180px; }
      .status-msg { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <header class="atm-header">
    <div class="atm-logo" onclick="window.location.href='index.html'">FAMILY <span>ATM</span></div>
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </header>

  <main class="atm-body">
    <div class="step-label">STEP 1 / 5</div>
    <div class="step-title">생체 인식 보안 시스템</div>
    <div class="step-desc" id="step-desc">검지 손가락 지문을 인식해주세요</div>

    <div class="fp-container" id="fp-container"></div>

    <div class="gauge-wrap" id="gauge-wrap">
      <div class="gauge-label">
        <span id="gauge-name">인식 중...</span>
        <span id="gauge-pct">0%</span>
      </div>
      <div class="gauge-bar">
        <div class="gauge-fill" id="gauge-fill"></div>
      </div>
    </div>

    <div class="status-msg" id="status-msg">지문을 인식해 주세요</div>
  </main>

  <footer class="atm-footer">손가락을 떼지 마세요 — 인식이 완료될 때까지 유지해 주세요</footer>

  <script>
    const settings = JSON.parse(localStorage.getItem('atm_settings') || '{}');
    const persons = [
      settings.dadName ? { name: settings.dadName } : null,
      settings.momName ? { name: settings.momName } : null,
    ].filter(Boolean);

    if (persons.length === 0) persons.push({ name: '고객' });

    const isTwoPerson = persons.length === 2;
    const doneState = persons.map(() => false);
    let activeIdx = null;
    let scanInterval = null;
    let progress = 0;

    const container = document.getElementById('fp-container');
    persons.forEach((person, idx) => {
      const block = document.createElement('div');
      block.className = 'fp-block';
      block.innerHTML = `
        <div class="fp-name" id="fp-name-${idx}">${person.name}</div>
        <div class="fingerprint-wrap" id="fp-wrap-${idx}">
          <div class="fp-ring"></div>
          <div class="fp-ring"></div>
          <div class="fp-ring"></div>
          <div class="fp-icon" id="fp-icon-${idx}">🫆</div>
          <div class="scan-overlay" id="scan-overlay-${idx}">
            <div class="laser-beam"></div>
          </div>
        </div>
      `;

      const wrap = block.querySelector('.fingerprint-wrap');
      // 이벤트 리스너
      const startEvent = (e) => { e.preventDefault(); startScan(idx); };
      const endEvent = () => stopScan(idx);

      wrap.addEventListener('mousedown', startEvent);
      wrap.addEventListener('touchstart', startEvent, { passive: false });
      wrap.addEventListener('mouseup', endEvent);
      wrap.addEventListener('touchend', endEvent);

      container.appendChild(block);
    });

    if (isTwoPerson) {
      document.getElementById('step-desc').textContent = `두 분 모두 지문을 순서대로 인식해 주세요`;
    }

    function startScan(idx) {
      if (doneState[idx] || (activeIdx !== null && activeIdx !== idx)) return;
      activeIdx = idx;
      document.getElementById('scan-overlay-' + idx).classList.add('active');
      document.getElementById('fp-wrap-' + idx).classList.add('scanning');
      document.getElementById('gauge-wrap').classList.add('visible');
      document.getElementById('gauge-name').textContent = persons[idx].name + ' 인식 중...';
      document.getElementById('status-msg').textContent = '인식 중...';

      progress = 0;
      scanInterval = setInterval(() => {
        progress += 2;
        document.getElementById('gauge-fill').style.width = progress + '%';
        document.getElementById('gauge-pct').textContent = progress + '%';
        if (progress >= 100) {
          clearInterval(scanInterval);
          onScanComplete(idx);
        }
      }, 40);
    }

    function stopScan(idx) {
      if (doneState[idx] || progress >= 100) return;
      clearInterval(scanInterval);
      activeIdx = null;
      progress = 0;
      document.getElementById('scan-overlay-' + idx).classList.remove('active');
      document.getElementById('fp-wrap-' + idx).classList.remove('scanning');
      document.getElementById('gauge-fill').style.width = '0%';
      document.getElementById('gauge-pct').textContent = '0%';
      document.getElementById('gauge-wrap').classList.remove('visible');
      document.getElementById('status-msg').textContent = '지문을 인식해 주세요';
    }

    function onScanComplete(idx) {
      doneState[idx] = true;
      activeIdx = null;
      document.getElementById('scan-overlay-' + idx).classList.remove('active');
      document.getElementById('fp-wrap-' + idx).classList.add('done-wrap');
      document.getElementById('fp-icon-' + idx).textContent = '✅';
      document.getElementById('fp-name-' + idx).classList.add('done');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      if (doneState.every(Boolean)) {
        document.getElementById('status-msg').className = 'status-msg success';
        document.getElementById('status-msg').textContent = '✅ 모든 인증 완료!';
        setTimeout(() => window.location.href = 'step2.html', 1200);
      } else {
        const nextIdx = doneState.findIndex(v => !v);
        document.getElementById('gauge-wrap').classList.remove('visible');
        document.getElementById('status-msg').textContent = `${persons[nextIdx].name}님 지문을 인식해 주세요`;
      }
    }
  </script>
</body>
</html>
